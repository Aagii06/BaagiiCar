name: mashinuud_app
description: "Mashinuud app - Flutter application for car listings and management."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  json_annotation: ">=4.9.0 <5.0.0"
  cupertino_icons: ^1.0.8
  flutter_spinkit: ^5.2.0
  flutter_svg: ^2.2.4


  device_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  build_runner: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/
    - assets/logos/

